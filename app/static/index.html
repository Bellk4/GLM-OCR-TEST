<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>GLM-OCR Local Console</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=M+PLUS+1p:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<style>
			/* ── Design tokens ──────────────────────────────────────────── */
			:root {
				color-scheme: light dark;

				/* Typography */
				--mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
				--sans: "M PLUS 1p", "Hiragino Kaku Gothic ProN", sans-serif;

				/* Radii */
				--r-card: 18px;
				--r-ctrl: 10px;
				--r-pill: 999px;

				/* Light palette */
				--bg-start: #eef2ff;
				--bg-end:   #f8fafc;
				--panel:       rgba(255, 255, 255, 0.78);
				--panel-strong: rgba(255, 255, 255, 0.96);
				--ink:   #0f172a;
				--muted: #64748b;
				--line:  #e2e8f0;
				--surface: #f8fafc;
				--accent:       #4f46e5;
				--accent-hover: #4338ca;
				--accent-fg:    #ffffff;
				--accent-subtle: #eef2ff;
				--warn:       #d97706;
				--warn-hover: #b45309;
				--warn-fg:    #ffffff;
				--shadow-panel: 0 4px 32px rgba(15, 23, 42, 0.10), 0 1px 4px rgba(15, 23, 42, 0.05);
				--shadow-hover: 0 8px 40px rgba(15, 23, 42, 0.15), 0 2px 6px rgba(15, 23, 42, 0.07);
				--tt-bg: #0f172a;
				--tt-fg: #f8fafc;
				--drop-bg:        #f5f7ff;
				--drop-border:    #a5b4fc;
				--drop-drag-bg:   #e0e7ff;
				--drop-drag-bdr:  #4f46e5;
				--tbl-head-bg:    #f1f5f9;
				--input-bg:       #ffffff;
				--input-border:   #cbd5e1;
				--focus-ring:     0 0 0 3px rgba(79, 70, 229, 0.25);
			}

			/* ── Dark mode overrides ────────────────────────────────────── */
			@media (prefers-color-scheme: dark) {
				:root {
					--bg-start: #070b14;
					--bg-end:   #0d1117;
					--panel:        rgba(18, 24, 40, 0.88);
					--panel-strong: rgba(22, 30, 50, 0.98);
					--ink:   #e2e8f0;
					--muted: #94a3b8;
					--line:  #1e2d45;
					--surface: #080c16;
					--accent:       #818cf8;
					--accent-hover: #a5b4fc;
					--accent-fg:    #0a0d20;
					--accent-subtle: #1e1e50;
					--warn:       #fbbf24;
					--warn-hover: #f59e0b;
					--warn-fg:    #0a0a00;
					--shadow-panel: 0 4px 32px rgba(0, 0, 0, 0.55), 0 1px 6px rgba(0, 0, 0, 0.4);
					--shadow-hover: 0 8px 40px rgba(0, 0, 0, 0.70), 0 2px 8px rgba(0, 0, 0, 0.5);
					--tt-bg: #f1f5f9;
					--tt-fg: #0f172a;
					--drop-bg:       #0b1025;
					--drop-border:   #3b4fd0;
					--drop-drag-bg:  #1a2557;
					--drop-drag-bdr: #818cf8;
					--tbl-head-bg:   #182035;
					--input-bg:      #0d1117;
					--input-border:  #1e2d45;
					--focus-ring:    0 0 0 3px rgba(129, 140, 248, 0.30);
				}
			}

			/* ── Reset & base ───────────────────────────────────────────── */
			*, *::before, *::after { box-sizing: border-box; }

			body {
				margin: 0;
				min-height: 100vh;
				font-family: var(--sans);
				color: var(--ink);
				background:
					linear-gradient(145deg, var(--bg-start) 0%, var(--bg-end) 100%)
					fixed;
				-webkit-font-smoothing: antialiased;
			}

			/* ── Layout ─────────────────────────────────────────────────── */
			.wrap {
				max-width: 1200px;
				margin: 0 auto;
				padding: 24px 16px 40px;
				display: grid;
				gap: 16px;
			}

			.panel {
				background: var(--panel);
				backdrop-filter: blur(16px) saturate(160%);
				-webkit-backdrop-filter: blur(16px) saturate(160%);
				border: 1px solid var(--line);
				border-radius: var(--r-card);
				box-shadow: var(--shadow-panel);
				transition: box-shadow 0.25s ease;
			}

			/* ── Header ─────────────────────────────────────────────────── */
			.header {
				padding: 18px 22px;
				display: flex;
				flex-wrap: wrap;
				gap: 10px;
				align-items: center;
				justify-content: space-between;
				border-bottom: 1px solid var(--line);
			}

			h1 {
				margin: 0;
				font-size: 20px;
				font-weight: 700;
				letter-spacing: 0.01em;
				background: linear-gradient(110deg, var(--ink) 40%, var(--accent));
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				background-clip: text;
			}

			/* ── Tags (status badges) ───────────────────────────────────── */
			.tag {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				font-size: 11px;
				font-family: var(--mono);
				border: 1px solid var(--line);
				border-radius: var(--r-pill);
				padding: 5px 11px;
				background: var(--panel-strong);
				color: var(--muted);
				transition: color 0.2s, border-color 0.2s;
			}

			/* ── Form shell ─────────────────────────────────────────────── */
			form {
				padding: 16px 22px 22px;
				display: grid;
				grid-template-columns: 1fr;
				gap: 14px;
			}

			.form-group {
				margin: 0;
				padding: 14px;
				border: 1px solid var(--line);
				border-radius: var(--r-ctrl);
				background: var(--panel-strong);
			}

			.form-group legend {
				padding: 0 6px;
				font-size: 11px;
				font-weight: 700;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: var(--muted);
			}

			.group-grid {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
				gap: 12px;
			}

			/* ── Details / advanced ─────────────────────────────────────── */
			.form-advanced {
				border: 1px solid var(--line);
				border-radius: var(--r-ctrl);
				background: var(--panel-strong);
				padding: 10px 14px 12px;
			}

			.form-advanced > summary {
				cursor: pointer;
				font-size: 12px;
				font-weight: 700;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				color: var(--muted);
				user-select: none;
				transition: color 0.15s;
			}

			.form-advanced > summary:hover { color: var(--ink); }

			.advanced-sections {
				display: grid;
				gap: 12px;
				margin-top: 12px;
			}

			/* ── Labels & help trigger ──────────────────────────────────── */
			label {
				display: grid;
				gap: 6px;
				font-size: 12px;
				color: var(--muted);
			}

			.label-title {
				display: inline-flex;
				align-items: center;
				gap: 5px;
				line-height: 1.2;
			}

			.help-trigger {
				position: relative;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				flex: 0 0 auto;
				width: 15px;
				height: 15px;
				padding: 0;
				border: 1px solid var(--input-border);
				border-radius: var(--r-pill);
				background: var(--input-bg);
				color: var(--muted);
				font-size: 10px;
				font-weight: 700;
				line-height: 1;
				cursor: pointer;
				transition: border-color 0.15s, background 0.15s;
			}

			.help-trigger:hover {
				border-color: var(--accent);
				background: var(--accent-subtle);
				color: var(--accent);
			}

			.help-trigger::before,
			.help-trigger::after {
				opacity: 0;
				pointer-events: none;
				transition: opacity 0.15s ease;
			}

			.help-trigger::before {
				content: "";
				position: absolute;
				top: calc(100% + 2px);
				left: 50%;
				transform: translateX(-50%);
				border-left: 6px solid transparent;
				border-right: 6px solid transparent;
				border-bottom: 6px solid var(--tt-bg);
				z-index: 5;
			}

			.help-trigger::after {
				content: attr(data-help);
				position: absolute;
				top: calc(100% + 8px);
				left: 50%;
				transform: translateX(-50%);
				z-index: 4;
				width: 240px;
				max-width: min(240px, 72vw);
				padding: 9px 12px;
				border-radius: 10px;
				background: var(--tt-bg);
				color: var(--tt-fg);
				font-size: 11px;
				font-weight: 400;
				text-align: left;
				white-space: normal;
				box-shadow: 0 4px 20px rgba(0,0,0,0.25);
			}

			.help-trigger:focus-visible::before,
			.help-trigger:focus-visible::after,
			.help-trigger.is-open::before,
			.help-trigger.is-open::after { opacity: 1; }

			/* ── File dropzone ──────────────────────────────────────────── */
			.file-dropzone {
				position: relative;
				min-height: 100px;
				border: 2px dashed var(--drop-border);
				border-radius: 14px;
				background: var(--drop-bg);
				display: grid;
				place-items: center;
				text-align: center;
				padding: 14px;
				transition: border-color 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease;
			}

			.file-dropzone:hover {
				border-color: var(--accent);
				box-shadow: 0 0 0 4px var(--accent-subtle);
			}

			.file-dropzone.is-dragging {
				border-color: var(--drop-drag-bdr);
				background: var(--drop-drag-bg);
				box-shadow: 0 0 0 4px var(--accent-subtle);
			}

			.file-drop-text {
				font-size: 12px;
				color: var(--muted);
				pointer-events: none;
			}

			.file-drop-text strong {
				display: block;
				color: var(--ink);
				font-size: 13px;
				margin-bottom: 4px;
			}

			.file-input-overlay {
				position: absolute;
				inset: 0;
				opacity: 0;
				cursor: pointer;
				border: 0;
				padding: 0;
				margin: 0;
				width: 100%;
				height: 100%;
			}

			/* ── Form controls ──────────────────────────────────────────── */
			input, select, textarea, button { font: inherit; }

			input, select, textarea {
				width: 100%;
				border: 1px solid var(--input-border);
				border-radius: var(--r-ctrl);
				padding: 9px 11px;
				background: var(--input-bg);
				color: var(--ink);
				font-size: 14px;
				transition: border-color 0.15s, box-shadow 0.15s;
				outline: none;
			}

			input:focus, select:focus, textarea:focus {
				border-color: var(--accent);
				box-shadow: var(--focus-ring);
			}

			input:disabled, select:disabled, textarea:disabled {
				opacity: 0.45;
				cursor: not-allowed;
			}

			textarea {
				resize: vertical;
				min-height: 110px;
				font-family: var(--mono);
			}

			/* ── Grid helpers ───────────────────────────────────────────── */
			.span-2 { grid-column: span 2; }

			.actions {
				display: flex;
				align-items: center;
				gap: 10px;
				grid-column: 1 / -1;
			}

			/* ── Buttons ────────────────────────────────────────────────── */
			button {
				border: 0;
				border-radius: var(--r-ctrl);
				padding: 10px 20px;
				background: var(--accent);
				color: var(--accent-fg);
				font-weight: 700;
				font-size: 14px;
				cursor: pointer;
				transition: background 0.18s, box-shadow 0.18s, transform 0.1s;
				outline: none;
			}

			button:not(:disabled):hover {
				background: var(--accent-hover);
				box-shadow: 0 4px 16px rgba(79, 70, 229, 0.35);
				transform: translateY(-1px);
			}

			button:not(:disabled):active { transform: translateY(0); }

			button:focus-visible { box-shadow: var(--focus-ring); }

			button:disabled {
				opacity: 0.5;
				cursor: not-allowed;
				transform: none;
				box-shadow: none;
			}

			.button-secondary { background: var(--warn); color: var(--warn-fg); }

			.button-secondary:not(:disabled):hover {
				background: var(--warn-hover);
				box-shadow: 0 4px 16px rgba(217, 119, 6, 0.35);
			}

			.note {
				font-size: 12px;
				color: var(--muted);
			}

			/* ── Result panel head ──────────────────────────────────────── */
			.result-head {
				padding: 14px 22px;
				border-bottom: 1px solid var(--line);
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
				align-items: center;
			}

			.button-copy {
				margin-left: auto;
				border: 1px solid var(--line);
				border-radius: var(--r-pill);
				padding: 6px 14px;
				background: var(--panel-strong);
				color: var(--muted);
				font-size: 12px;
				font-weight: 600;
				transition: background 0.18s, border-color 0.18s, color 0.18s, box-shadow 0.18s;
			}

			.button-copy:not(:disabled):hover {
				border-color: var(--accent);
				color: var(--accent);
				box-shadow: none;
				transform: none;
			}

			.button-copy.copied {
				background: var(--accent);
				border-color: var(--accent);
				color: var(--accent-fg);
			}

			/* ── Page picker ────────────────────────────────────────────── */
			.page-picker {
				padding: 12px 22px 0;
				display: flex;
				align-items: center;
				gap: 10px;
			}

			.page-picker label {
				display: block;
				font-size: 12px;
				color: var(--muted);
				min-width: fit-content;
			}

			.page-picker select { max-width: 240px; }

			/* ── Result body & cards ────────────────────────────────────── */
			.result-body {
				padding: 16px 22px 22px;
				display: grid;
				gap: 12px;
			}

			.card {
				border: 1px solid var(--line);
				border-radius: var(--r-ctrl);
				background: var(--panel-strong);
				padding: 14px;
				transition: border-color 0.2s;
			}

			.card strong {
				display: block;
				font-size: 11px;
				font-weight: 700;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: var(--muted);
				margin-bottom: 8px;
			}

			.card hr {
				border: none;
				border-top: 1px solid var(--line);
				margin: 0 0 10px;
			}

			pre {
				margin: 0;
				font-family: var(--mono);
				font-size: 12px;
				line-height: 1.6;
				white-space: pre-wrap;
				word-break: break-word;
				color: var(--ink);
			}

			details summary {
				cursor: pointer;
				color: var(--warn);
				font-size: 12px;
				font-weight: 600;
				margin-bottom: 8px;
				transition: color 0.15s;
			}

			details summary:hover { color: var(--warn-hover); }

			.preview-image {
				width: 100%;
				height: auto;
				border: 1px solid var(--line);
				border-radius: 10px;
				background: var(--input-bg);
			}

			/* ── Table (blocks) ─────────────────────────────────────────── */
			.block-table-wrap { overflow-x: auto; }

			.block-table {
				width: 100%;
				border-collapse: collapse;
				font-size: 12px;
				font-family: var(--mono);
			}

			.block-table th,
			.block-table td {
				border: 1px solid var(--line);
				padding: 6px 10px;
				vertical-align: top;
			}

			.block-table th {
				background: var(--tbl-head-bg);
				font-weight: 700;
				text-align: left;
				color: var(--muted);
				letter-spacing: 0.04em;
			}

			/* ── Utility ────────────────────────────────────────────────── */
			.hidden { display: none; }

			@media (max-width: 760px) {
				.span-2 { grid-column: span 1; }
				.header { padding: 14px 16px; }
				form { padding: 12px 16px 16px; }
				.result-head, .result-body { padding-left: 16px; padding-right: 16px; }
			}
		</style>
	</head>
	<body>
		<div class="wrap">
			<section class="panel">
				<div class="header">
					<h1>GLM-OCR Local Console</h1>
					<div style="display: flex; gap: 8px; flex-wrap: wrap">
						<span class="tag" id="statusModel">model: -</span>
						<span class="tag" id="statusDevice">device: -</span>
						<span class="tag" id="statusCuda">cuda: -</span>
					</div>
				</div>
					<form id="analyzeForm">
						<fieldset class="form-group">
							<legend>入力</legend>
							<div class="group-grid">
								<label class="span-2">
								<span class="label-title"
									>ファイル (画像/PDF)
									<button
										class="help-trigger"
											type="button"
											data-help="解析対象ファイルです。PDFはページごとに展開してOCRします。"
											aria-label="ファイルの説明"
										>
											?
										</button>
									</span>
									<div class="file-dropzone" id="fileDropzone">
										<div class="file-drop-text" id="fileDropText">
											<strong>ドラッグ&ドロップ</strong>
											またはクリックしてファイルを選択
										</div>
										<input
											id="file"
											name="file"
											type="file"
											class="file-input-overlay"
											accept=".pdf,image/*"
											required
										/>
									</div>
								</label>
								<label>
									<span class="label-title"
										>task
										<button
											class="help-trigger"
											type="button"
											data-help="認識タイプを指定します。text/table/formula/extract_json から選択します。"
											aria-label="taskの説明"
										>
											?
										</button>
									</span>
									<select id="task" name="task">
										<option value="text" selected>Text</option>
										<option value="table">Table</option>
										<option value="formula">Formula</option>
										<option value="extract_json">JSON抽出</option>
									</select>
								</label>
								<label id="schemaWrap" class="span-2 hidden">
									<span class="label-title"
										>schema (JSON Schema string)
										<button
											class="help-trigger"
											type="button"
											data-help="task が extract_json のとき必須です。出力したいJSON構造をスキーマで指定します。"
											aria-label="schemaの説明"
										>
											?
										</button>
									</span>
									<textarea
										id="schema"
										name="schema"
										placeholder='{"type":"object","properties":{"name":{"type":"string"}}}'
									></textarea>
								</label>
							</div>
						</fieldset>

						<details class="form-advanced">
							<summary>詳細設定</summary>
							<div class="advanced-sections">
								<fieldset class="form-group">
									<legend>レイアウトOCR</legend>
									<div class="group-grid">
										<label>
											<span class="label-title"
												>領域分割OCR
												<button
													class="help-trigger"
													type="button"
													data-help="ONでレイアウト解析後に領域ごとOCRします。段組み・縦書き文書の読順崩れ対策向けです。"
													aria-label="領域分割OCRの説明"
												>
													?
												</button>
											</span>
											<select id="use_layout" name="use_layout">
												<option value="false" selected>OFF (従来ページOCR)</option>
												<option value="true">ON (PP-DocLayoutV3)</option>
											</select>
										</label>
										<label>
											<span class="label-title"
												>layout backend
												<button
													class="help-trigger"
													type="button"
													data-help="レイアウト解析器です。ppdoclayoutv3推奨。noneはページ全体を1領域として扱います。"
													aria-label="layout backendの説明"
												>
													?
												</button>
											</span>
											<select id="layout_backend" name="layout_backend">
												<option value="ppdoclayoutv3" selected>ppdoclayoutv3</option>
												<option value="none">none</option>
											</select>
										</label>
										<label>
											<span class="label-title"
												>reading_order
												<button
													class="help-trigger"
													type="button"
													data-help="領域の結合順です。autoは自動推定、ltr_ttbは左から右、rtl_ttbは右から左、vertical_rlは縦書き右列優先です。"
													aria-label="reading_orderの説明"
												>
													?
												</button>
											</span>
											<select id="reading_order" name="reading_order">
												<option value="auto" selected>auto</option>
												<option value="ltr_ttb">ltr_ttb</option>
												<option value="rtl_ttb">rtl_ttb</option>
												<option value="vertical_rl">vertical_rl</option>
											</select>
										</label>
										<label>

												<button

													aria-label="max_regionsの説明"
												>

											<input

											<span class="label-title"
												>region_parallelism
												<button

													data-help="同時に回す領域推論数です。1が安全で、上げると速くなる場合がありますがVRAM使用量は増えます。"
													aria-label="region_parallelismの説明"

											<input

									</div>

								<fieldset class="form-group">
									<legend>品質</legend>
									<div class="group-grid">
										<label>
											<span class="label-title"
												>改行処理
												<button
													class="help-trigger"

												>
													?
												</button>
											</span>
											<select id="linebreak_mode" name="linebreak_mode">
												<option value="none" selected>処理しない</option>
												<option value="paragraph">段落整形（空行維持）</option>
												<option value="compact">強力整形（改行ほぼ除去）</option>
											</select>
										</label>
										<label>
											<span class="label-title"
												>dpi (PDF only)
												<button
													class="help-trigger"
													type="button"
													data-help="PDFを画像化する解像度です。高いほど精細ですが処理時間とメモリ消費が増えます。"
													aria-label="dpiの説明"
												>
													?
												</button>
											</span>
											<input
												id="dpi"
												name="dpi"
												type="number"
												min="72"
												max="600"
												value="300"
											/>
										</label>
										<label>
											<span class="label-title"
												>max_new_tokens
												<button
													class="help-trigger"
													type="button"
													data-help="1回の生成トークン上限です。大きいほど長文を返せますが遅くなります。"
													aria-label="max_new_tokensの説明"
												>
													?
												</button>
											</span>
											<input
												id="max_new_tokens"
												name="max_new_tokens"
												type="number"
												min="1"
												max="32768"
												value="1024"
											/>
										</label>
										<label>

												>temperature
												<button

													data-help="生成のランダム性です。0は最も決定的、値を上げると多様になります。"

												>

											<span class="label-title"
												>model
												<button
													class="help-trigger"
													type="button"
													data-help="使用するHuggingFaceモデルIDです。サーバー設定で許可された候補から選択します。"
													aria-label="modelの説明"
												>
													?
												</button>
											</span>
											<select id="model_id" name="model_id">
												<option value="zai-org/GLM-OCR" selected>zai-org/GLM-OCR</option>
											</select>
										</label>
										<label>
											<span class="label-title"
												>device
												<button
													class="help-trigger"
													type="button"
													data-help="推論に使う計算デバイスです。autoはCUDA利用可ならGPU、不可ならCPUを選びます。"
													aria-label="deviceの説明"
												>
													?
												</button>
											</span>
											<select id="device" name="device">
												<option value="auto" selected>auto</option>
												<option value="cuda">cuda</option>

						</details>
						<div class="actions">
							<button id="submitBtn" type="submit">実行</button>
							<button
							id="cancelBtn"
							class="button-secondary hidden"
							type="button"
							disabled
						>
							中断

			</section>

				<section class="panel">
					<div class="result-head">
						<span class="tag" id="resultModel">model: -</span>
						<span class="tag" id="resultTask">task: -</span>
						<span class="tag" id="resultLinebreak">linebreak: -</span>
						<span class="tag" id="resultPages">pages: -</span>
						<span class="tag" id="resultDevice">run device: -</span>
						<span class="tag" id="resultLayout">layout: -</span>
						<span class="tag" id="resultOrder">order: -</span>
						<button id="copyBtn" class="button-copy" type="button" disabled>
							コピー
						</button>
					</div>
				<div class="page-picker hidden" id="pagePickerWrap">
					<label for="pageSelect">表示ページ</label>
					<select id="pageSelect"></select>
				</div>
				<div class="result-body" id="resultBody">
					<div class="card">
						<pre>ここに解析結果が表示されます。</pre>
					</div>
				</div>
			</section>
		</div>

		<script>
			const form = document.getElementById("analyzeForm");
			const submitBtn = document.getElementById("submitBtn");
				const cancelBtn = document.getElementById("cancelBtn");
				const copyBtn = document.getElementById("copyBtn");
				const requestNote = document.getElementById("requestNote");
				const fileInput = document.getElementById("file");
				const fileDropzone = document.getElementById("fileDropzone");
				const fileDropText = document.getElementById("fileDropText");
				const taskInput = document.getElementById("task");
			const schemaWrap = document.getElementById("schemaWrap");
			const schemaInput = document.getElementById("schema");
			const useLayoutInput = document.getElementById("use_layout");
			const layoutBackendInput = document.getElementById("layout_backend");
			const readingOrderInput = document.getElementById("reading_order");
			const regionPaddingInput = document.getElementById("region_padding");
			const maxRegionsInput = document.getElementById("max_regions");
			const regionParallelismInput = document.getElementById("region_parallelism");
			const pagePickerWrap = document.getElementById("pagePickerWrap");
			const pageSelect = document.getElementById("pageSelect");
			const resultBody = document.getElementById("resultBody");

			const statusModel = document.getElementById("statusModel");
			const statusDevice = document.getElementById("statusDevice");
			const statusCuda = document.getElementById("statusCuda");
			const resultTask = document.getElementById("resultTask");
			const resultModel = document.getElementById("resultModel");
			const resultLinebreak = document.getElementById("resultLinebreak");
			const resultPages = document.getElementById("resultPages");
			const resultDevice = document.getElementById("resultDevice");
			const resultLayout = document.getElementById("resultLayout");
			const resultOrder = document.getElementById("resultOrder");
			const modelInput = document.getElementById("model_id");

			function populateModelOptions(models, selectedModel) {
				if (!modelInput) {
					return;
				}
				const currentValue = selectedModel || modelInput.value || "";
				modelInput.innerHTML = "";
				const normalized = Array.isArray(models) ? models : [];
				if (normalized.length === 0 && currentValue) {
					const fallbackOption = document.createElement("option");
					fallbackOption.value = currentValue;
					fallbackOption.textContent = currentValue;
					modelInput.appendChild(fallbackOption);
					modelInput.value = currentValue;
					return;
				}
				normalized.forEach((item) => {
					const option = document.createElement("option");
					option.value = String(item);
					option.textContent = String(item);
					modelInput.appendChild(option);
				});
				const preferred = currentValue || normalized[0] || "";
				if (preferred) {
					modelInput.value = preferred;
				}
			}

			let currentResults = [];
			let progressPollTimer = null;
			let activeRequestId = null;
			let currentViewItem = null;
			let currentViewLabel = "";
			let copyFeedbackTimer = null;
				let currentMeta = {
					useLayout: false,
					readingOrder: "auto",
					layoutBackend: "-",
				};
				const helpTriggers = Array.from(document.querySelectorAll(".help-trigger"));

				function closeHelpBubbles(except = null) {
					helpTriggers.forEach((btn) => {
						if (except && btn === except) {
							return;
						}
						btn.classList.remove("is-open");
						btn.setAttribute("aria-expanded", "false");
					});
				}

				function setupHelpBubbles() {
					helpTriggers.forEach((btn) => {
						btn.setAttribute("aria-expanded", "false");
						btn.addEventListener("click", (event) => {
							event.preventDefault();
							event.stopPropagation();
							const isOpen = btn.classList.contains("is-open");
							closeHelpBubbles();
							if (!isOpen) {
								btn.classList.add("is-open");
								btn.setAttribute("aria-expanded", "true");
							}
						});
					});
					document.addEventListener("click", () => closeHelpBubbles());
					document.addEventListener("keydown", (event) => {
						if (event.key === "Escape") {
							closeHelpBubbles();
						}
					});
				}

				function updateFileDropText() {
					if (!fileDropText) {
						return;
					}
					if (fileInput && fileInput.files && fileInput.files.length > 0) {
						fileDropText.innerHTML = `<strong>選択中:</strong>${fileInput.files[0].name}`;
						return;
					}
					fileDropText.innerHTML =
						"<strong>ドラッグ&ドロップ</strong>またはクリックしてファイルを選択";
				}

				function setupFileDropzone() {
					if (!fileDropzone || !fileInput) {
						return;
					}
					const onDragEnter = (event) => {
						event.preventDefault();
						fileDropzone.classList.add("is-dragging");
					};
					const onDragLeave = (event) => {
						event.preventDefault();
						if (!fileDropzone.contains(event.relatedTarget)) {
							fileDropzone.classList.remove("is-dragging");
						}
					};
					const onDragOver = (event) => {
						event.preventDefault();
						fileDropzone.classList.add("is-dragging");
					};
					const onDrop = (event) => {
						event.preventDefault();
						fileDropzone.classList.remove("is-dragging");
						const droppedFiles = event.dataTransfer && event.dataTransfer.files;
						if (!droppedFiles || droppedFiles.length === 0) {
							return;
						}
						try {
							const transfer = new DataTransfer();
							for (const droppedFile of droppedFiles) {
								transfer.items.add(droppedFile);
							}
							fileInput.files = transfer.files;
						} catch (error) {
							// Ignore browsers that disallow assignment.
						}
						updateFileDropText();
					};

					fileDropzone.addEventListener("dragenter", onDragEnter);
					fileDropzone.addEventListener("dragleave", onDragLeave);
					fileDropzone.addEventListener("dragover", onDragOver);
					fileDropzone.addEventListener("drop", onDrop);
					fileInput.addEventListener("change", updateFileDropText);
					updateFileDropText();
				}

			function taskNeedsSchema(task) {
				return task === "extract_json";
			}

			function isLayoutEnabled() {
				return useLayoutInput.value === "true";
			}

			function toggleSchema() {
				const show = taskNeedsSchema(taskInput.value);
				schemaWrap.classList.toggle("hidden", !show);
				schemaInput.required = show;
			}

			function toggleLayoutOptions() {
				const enabled = isLayoutEnabled();
				layoutBackendInput.disabled = !enabled;
				readingOrderInput.disabled = !enabled;
				regionPaddingInput.disabled = !enabled;
				maxRegionsInput.disabled = !enabled;
				regionParallelismInput.disabled = !enabled;
			}

			function setBusy(isBusy, message) {
				submitBtn.disabled = isBusy;
				const canCancel = isBusy && Boolean(activeRequestId);
				cancelBtn.disabled = !canCancel;
				cancelBtn.classList.toggle("hidden", !canCancel);
				requestNote.textContent = message;
			}

			function resetCopyState() {
				currentViewItem = null;
				currentViewLabel = "";
				copyBtn.disabled = true;
				if (copyFeedbackTimer) {
					clearTimeout(copyFeedbackTimer);
					copyFeedbackTimer = null;
				}
				copyBtn.classList.remove("copied");
				copyBtn.textContent = "コピー";
			}

			function setError(message) {
				resetCopyState();
				resultBody.innerHTML = "";
				const card = document.createElement("div");
				card.className = "card";
				const pre = document.createElement("pre");
				pre.textContent = message;
				card.appendChild(pre);
				resultBody.appendChild(card);
			}

			function renderLoading(message = "解析中... しばらくお待ちください。") {
				resetCopyState();
				resultBody.innerHTML = "";
				const card = document.createElement("div");
				card.className = "card";
				const pre = document.createElement("pre");
				pre.id = "loadingText";
				pre.textContent = message;
				card.appendChild(pre);
				resultBody.appendChild(card);
			}

			function updateLoading(message) {
				const pre = document.getElementById("loadingText");
				if (pre) {
					pre.textContent = message;
				}
			}

			function createRequestId() {
				if (window.crypto && typeof window.crypto.randomUUID === "function") {
					return window.crypto.randomUUID();
				}
				return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
			}

			function stopProgressPolling() {
				if (progressPollTimer) {
					clearInterval(progressPollTimer);
					progressPollTimer = null;
				}
			}

			function startProgressPolling(requestId) {
				stopProgressPolling();
				const poll = async () => {
					try {
						const res = await fetch(`/api/progress/${encodeURIComponent(requestId)}`);
						if (!res.ok) {
							return;
						}
						const payload = await res.json();
						const message = payload.message || "解析中...";
						setBusy(true, message);
						updateLoading(message);
						if (payload.total_pages && Number(payload.total_pages) > 0) {
							resultPages.textContent = `pages: ${payload.total_pages}`;
						}
						if (
							payload.state === "done" ||
							payload.state === "error" ||
							payload.state === "canceled"
						) {
							stopProgressPolling();
						}
					} catch (error) {
						// Keep silent during transient polling errors.
					}
				};
				poll();
				progressPollTimer = setInterval(poll, 500);
			}

			function renderPageSelector(results) {
				pageSelect.innerHTML = "";
				const allOption = document.createElement("option");
				allOption.value = "all";
				allOption.textContent = "ALL";
				pageSelect.appendChild(allOption);
				results.forEach((item, index) => {
					const option = document.createElement("option");
					option.value = String(index);
					option.textContent = `Page ${item.page}`;
					pageSelect.appendChild(option);
				});
				pageSelect.value = "all";
				pagePickerWrap.classList.remove("hidden");
			}

			function combineAllPages(results) {
				const text = results.map((item) => `[Page ${item.page}]\n${item.text || ""}`).join("\n\n");
				const raw = results.map((item) => `[Page ${item.page}]\n${item.raw || ""}`).join("\n\n");
				const json = results
					.filter((item) => item.json !== null && item.json !== undefined)
					.map((item) => ({ page: item.page, json: item.json }));
				const errors = results
					.filter((item) => item.error)
					.map((item) => `[Page ${item.page}] ${item.error}`);
				return {
					text,
					raw,
					json: json.length > 0 ? json : null,
					error: errors.length > 0 ? errors.join("\n") : null,
				};
			}

			function createCard(title, content = null) {
				const card = document.createElement("div");
				card.className = "card";
				if (title) {
					const strong = document.createElement("strong");
					strong.textContent = title;
					card.appendChild(strong);
					card.appendChild(document.createElement("hr"));
				}
				if (content) {
					card.appendChild(content);
				}
				return card;
			}

				function renderBlocksTable(blocks) {
					const wrap = document.createElement("div");
					wrap.className = "block-table-wrap";
					const table = document.createElement("table");
					table.className = "block-table";
				const thead = document.createElement("thead");
				thead.innerHTML =
					"<tr><th>ID</th><th>type</th><th>bbox</th><th>truncated</th><th>text</th></tr>";
				table.appendChild(thead);
					const tbody = document.createElement("tbody");
					blocks.forEach((block) => {
						const tr = document.createElement("tr");
						const bbox = block.bbox || {};
						const bboxText = `(${bbox.x1 ?? "-"},${bbox.y1 ?? "-"})-(${bbox.x2 ?? "-"},${bbox.y2 ?? "-"})`;
						const snippet = String(block.text || "").slice(0, 280);
						const values = [
							String(block.id || ""),
							String(block.type || ""),
							bboxText,
							String(Boolean(block.truncated)),
							snippet,
						];
						values.forEach((value) => {
							const td = document.createElement("td");
							td.textContent = value;
							tr.appendChild(td);
						});
						tbody.appendChild(tr);
					});
					table.appendChild(tbody);
					wrap.appendChild(table);
					return wrap;
			}

			function renderResultItem(item, textLabel = "text", jsonLabel = "json", copyLabel = "") {
				currentViewItem = item;
				currentViewLabel = copyLabel;
				copyBtn.disabled = false;
				if (copyFeedbackTimer) {
					clearTimeout(copyFeedbackTimer);
					copyFeedbackTimer = null;
				}
				copyBtn.classList.remove("copied");
				copyBtn.textContent = "コピー";
				resultBody.innerHTML = "";

				if (item.layout_preview_base64) {
					const img = document.createElement("img");
					img.className = "preview-image";
					img.alt = "layout preview";
					img.src = `data:image/png;base64,${item.layout_preview_base64}`;
					resultBody.appendChild(createCard("layout_preview", img));
				}

				if (Array.isArray(item.blocks) && item.blocks.length > 0) {
					resultBody.appendChild(createCard("blocks", renderBlocksTable(item.blocks)));
				}

				const textPre = document.createElement("pre");
				textPre.textContent = item.text || "";
				resultBody.appendChild(createCard(textLabel, textPre));

				if (item.json !== null && item.json !== undefined) {
					const jsonPre = document.createElement("pre");
					jsonPre.textContent = JSON.stringify(item.json, null, 2);
					resultBody.appendChild(createCard(jsonLabel, jsonPre));
				}

				const rawPre = document.createElement("pre");
				rawPre.textContent = item.raw || "";
				const details = document.createElement("details");
				const summary = document.createElement("summary");
				summary.textContent = "raw (debug)";
				details.appendChild(summary);
				details.appendChild(rawPre);
				const rawCard = createCard("", details);
				if (item.error) {
					const err = document.createElement("pre");
					err.textContent = item.error;
					rawCard.appendChild(err);
				}
				resultBody.appendChild(rawCard);
			}

			function renderPage(index) {
				const item = currentResults[index];
				if (!item) {
					setError("結果のページが見つかりません。");
					return;
				}
				if (item.reading_order) {
					resultOrder.textContent = `order: ${item.reading_order}`;
				}
				renderResultItem(item, "text", "json", `Page ${item.page}`);
			}

			function renderAllPages() {
				resultOrder.textContent = `order: ${currentMeta.readingOrder || "-"}`;
				renderResultItem(combineAllPages(currentResults), "text (ALL)", "json (ALL)", "ALL");
			}

			function buildCopyText(item, label) {
				if (!item) {
					return "";
				}
				const parts = [];
				if (label) {
					parts.push(`# ${label}`);
				}
				if (item.text) {
					parts.push(`[text]\n${item.text}`);
				}
				if (item.json !== null && item.json !== undefined) {
					parts.push(`[json]\n${JSON.stringify(item.json, null, 2)}`);
				}
				if (item.error) {
					parts.push(`[error]\n${item.error}`);
				}
				return parts.join("\n\n").trim();
			}

			function showCopyFeedback(message, copied = false) {
				requestNote.textContent = message;
				if (copyFeedbackTimer) {
					clearTimeout(copyFeedbackTimer);
					copyFeedbackTimer = null;
				}
				copyBtn.classList.toggle("copied", copied);
				copyBtn.textContent = copied ? "コピー済み" : "コピー";
				if (copied) {
					copyFeedbackTimer = setTimeout(() => {
						copyBtn.classList.remove("copied");
						copyBtn.textContent = "コピー";
						copyFeedbackTimer = null;
					}, 1200);
				}
			}

			async function copyCurrentView() {
				const text = buildCopyText(currentViewItem, currentViewLabel);
				if (!text) {
					return;
				}
				try {
					await navigator.clipboard.writeText(text);
					showCopyFeedback("コピーしました", true);
				} catch (error) {
					const textarea = document.createElement("textarea");
					textarea.value = text;
					textarea.style.position = "fixed";
					textarea.style.opacity = "0";
					document.body.appendChild(textarea);
					textarea.focus();
					textarea.select();
					try {
						document.execCommand("copy");
						showCopyFeedback("コピーしました", true);
					} catch (fallbackError) {
						showCopyFeedback("コピーに失敗しました", false);
					} finally {
						document.body.removeChild(textarea);
					}
				}
			}

			async function fetchStatus() {
				try {
					const res = await fetch("/api/status");
					const payload = await res.json();
					statusModel.textContent = `model: ${payload.model || "-"}`;
					statusDevice.textContent = `device default: ${payload.device_default || "-"}`;
					statusCuda.textContent = `cuda: ${String(payload.cuda_available)}`;
					populateModelOptions(payload.models, payload.model || payload.model_default);
					const cudaOption = document.querySelector('#device option[value="cuda"]');
					if (cudaOption) {
						cudaOption.disabled = !payload.cuda_available;
						if (!payload.cuda_available && document.getElementById("device").value === "cuda") {
							document.getElementById("device").value = "auto";
						}
					}
				} catch (error) {
					statusCuda.textContent = "cuda: status unavailable";
				}
			}

			form.addEventListener("submit", async (event) => {
				event.preventDefault();
				if (!fileInput.files || fileInput.files.length === 0) {
					setError("ファイルを選択してください。");
					return;
				}

				const formData = new FormData();
				const requestId = createRequestId();
				activeRequestId = requestId;
				formData.append("file", fileInput.files[0]);
				formData.append("model_id", modelInput.value);
				formData.append("device", document.getElementById("device").value);
				formData.append("dpi", document.getElementById("dpi").value);
				formData.append("task", taskInput.value);
				formData.append("linebreak_mode", document.getElementById("linebreak_mode").value);
				formData.append("max_new_tokens", document.getElementById("max_new_tokens").value);
				formData.append("temperature", document.getElementById("temperature").value);
				formData.append("use_layout", useLayoutInput.value);
				formData.append("layout_backend", layoutBackendInput.value);
				formData.append("reading_order", readingOrderInput.value);
				formData.append("region_padding", regionPaddingInput.value);
				formData.append("max_regions", maxRegionsInput.value);
				formData.append("region_parallelism", regionParallelismInput.value);
				formData.append("request_id", requestId);
				if (taskNeedsSchema(taskInput.value)) {
					formData.append("schema", schemaInput.value);
				}

				setBusy(true, "事前処理中");
				pageSelect.innerHTML = "";
				pagePickerWrap.classList.add("hidden");
				resetCopyState();
				currentResults = [];
				resultModel.textContent = `model: ${modelInput.value || "-"}`;
				resultTask.textContent = `task: ${taskInput.value}`;
				resultLinebreak.textContent = `linebreak: ${document.getElementById("linebreak_mode").value}`;
				resultPages.textContent = "pages: -";
				resultDevice.textContent = "run device: -";
				resultLayout.textContent = `layout: ${useLayoutInput.value}`;
				resultOrder.textContent = `order: ${readingOrderInput.value}`;
				renderLoading("事前処理中");
				startProgressPolling(requestId);

				try {
					const res = await fetch("/api/analyze", { method: "POST", body: formData });
					const payload = await res.json();
					if (!res.ok) {
						throw new Error(payload.detail || "API request failed");
					}
					stopProgressPolling();
					activeRequestId = null;

					currentResults = Array.isArray(payload.results) ? payload.results : [];
					currentMeta = {
						useLayout: Boolean(payload.use_layout),
						readingOrder: payload.reading_order || "-",
						layoutBackend: payload.layout_backend || "-",
					};
					resultModel.textContent = `model: ${payload.model || modelInput.value || "-"}`;
					resultTask.textContent = `task: ${payload.task || "-"}`;
					resultLinebreak.textContent = `linebreak: ${payload.linebreak_mode || "-"}`;
					resultPages.textContent = `pages: ${payload.page_count || 0}`;
					resultDevice.textContent = `run device: ${payload.device || "-"}`;
					resultLayout.textContent = `layout: ${String(Boolean(payload.use_layout))} (${payload.layout_backend || "-"})`;
					resultOrder.textContent = `order: ${payload.reading_order || "-"}`;

					if (currentResults.length === 0) {
						if (payload.state === "canceled") {
							setError("中断しました。");
						} else {
							setError("結果が空です。");
						}
					} else {
						renderPageSelector(currentResults);
						renderAllPages();
					}
					if (payload.state === "canceled") {
						setBusy(false, "中断");
					} else {
						setBusy(false, "完了");
					}
				} catch (error) {
					stopProgressPolling();
					activeRequestId = null;
					setError(`エラー: ${error.message}`);
					setBusy(false, "失敗");
				}
			});

			cancelBtn.addEventListener("click", async () => {
				if (!activeRequestId) {
					return;
				}
				const requestId = activeRequestId;
				cancelBtn.disabled = true;
				requestNote.textContent = "中断要求中...";
				updateLoading("中断要求中...");
				try {
					const res = await fetch(`/api/cancel/${encodeURIComponent(requestId)}`, {
						method: "POST",
					});
					const payload = await res.json();
					if (!res.ok) {
						throw new Error(payload.detail || "中断要求に失敗しました");
					}
					requestNote.textContent = payload.message || "中断要求を受け付けました";
					updateLoading(payload.message || "中断要求を受け付けました");
				} catch (error) {
					requestNote.textContent = `中断要求失敗: ${error.message}`;
					if (activeRequestId) {
						cancelBtn.disabled = false;
					}
				}
			});

			pageSelect.addEventListener("change", () => {
				if (pageSelect.value === "all") {
					renderAllPages();
					return;
				}
				const index = Number(pageSelect.value);
				if (Number.isNaN(index)) {
					renderAllPages();
					return;
				}
				renderPage(index);
			});

			copyBtn.addEventListener("click", () => {
				void copyCurrentView();
			});

			taskInput.addEventListener("change", toggleSchema);
			useLayoutInput.addEventListener("change", toggleLayoutOptions);
			toggleSchema();
			toggleLayoutOptions();
			setupHelpBubbles();
			setupFileDropzone();
			fetchStatus();
		</script>
	</body>
</html>
